name: Test Secrets Direct
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Read & Check All Secrets
        run: |
          # 文件名
          echo "STORE_FILE: ${{ secrets.MYAPP_UPLOAD_STORE_FILE }}"
          # 别名
          echo "KEY_ALIAS: ${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}"

          # 判断密码是否存在（不打印明文）
          if [ -z "${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}" ]; then
            echo "❌ 库密码为空"
          else
            echo "✅ 库密码正常"
          fi

          if [ -z "${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}" ]; then
            echo "❌ 密钥密码为空"
          else
            echo "✅ 密钥密码正常"
          fi

          # 判断Base64密钥串
          b64="${{ secrets.MYAPP_KEYSTORE_BASE64 }}"
          if [ -z "$b64" ]; then
            echo "❌ 密钥Base64为空"
          else
            echo "✅ 密钥Base64正常，字符长度：${#b64}"
          fi