name: Test Raw Base64
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Direct decode hardcoded base64
        run: |
          cat << 'EOF' | base64 -w 0 --decode > test-key.p12
          <<>>
          EOF
          ls -lh test-key.p12
          file test-key.p12

      - name: Validate keystore
        run: |
          keytool -list -keystore test-key.p12 -storepass <<k5581783>> -alias <<feiyu666>>
