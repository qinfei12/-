name: Test Read Secrets
on: workflow_dispatch

env:
  # 和原项目变量名完全保持一致
  MYAPP_KEYSTORE_BASE64: ${{ secrets.MYAPP_KEYSTORE_BASE64 }}
  MYAPP_UPLOAD_STORE_FILE: ${{ secrets.MYAPP_UPLOAD_STORE_FILE }}
  MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}
  MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}
  MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}

jobs:
  check_secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check all secret variables
        run: |
          echo "===== 变量读取检查 ====="
          echo "MYAPP_UPLOAD_STORE_FILE = $MYAPP_UPLOAD_STORE_FILE"
          echo "MYAPP_UPLOAD_KEY_ALIAS = $MYAPP_UPLOAD_KEY_ALIAS"
          
          # 检查密码类是否非空（不打印明文，只判断是否存在）
          if [ -z "$MYAPP_UPLOAD_STORE_PASSWORD" ]; then
            echo "❌ MYAPP_UPLOAD_STORE_PASSWORD 为空！"
          else
            echo "✅ MYAPP_UPLOAD_STORE_PASSWORD 已读取（非空）"
          fi

          if [ -z "$MYAPP_UPLOAD_KEY_PASSWORD" ]; then
            echo "❌ MYAPP_UPLOAD_KEY_PASSWORD 为空！"
          else
            echo "✅ MYAPP_UPLOAD_KEY_PASSWORD 已读取（非空）"
          fi

          # 检查Base64密钥串是否非空
          if [ -z "$MYAPP_KEYSTORE_BASE64" ]; then
            echo "❌ MYAPP_KEYSTORE_BASE64 为空！"
          else
            echo "✅ MYAPP_KEYSTORE_BASE64 已读取（非空），长度：${#MYAPP_KEYSTORE_BASE64}"
          fi