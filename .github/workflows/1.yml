name: DEBUG SECRETS RAW
on: workflow_dispatch

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Print secrets raw
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE: |${{ secrets.MYAPP_UPLOAD_STORE_FILE }}|"
          echo "MYAPP_UPLOAD_KEY_ALIAS: |${{ secrets.MYAPP_UPLOAD_KEY_ALIAS }}|"

          if [ -z "${{ secrets.MYAPP_UPLOAD_STORE_PASSWORD }}" ]; then
            echo "❌ STORE_PASSWORD EMPTY"
          else
            echo "✅ STORE_PASSWORD EXISTS"
          fi

          if [ -z "${{ secrets.MYAPP_UPLOAD_KEY_PASSWORD }}" ]; then
            echo "❌ KEY_PASSWORD EMPTY"
          else
            echo "✅ KEY_PASSWORD EXISTS"
          fi

          b64="${{ secrets.MYAPP_KEYSTORE_BASE64 }}"
          if [ -z "$b64" ]; then
            echo "❌ KEYSTORE_BASE64 EMPTY"
          else
            echo "✅ KEYSTORE_BASE64 LEN: ${#b64}"
          fi