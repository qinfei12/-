name: Build

on:
  workflow_dispatch:

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Build Packages
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
           echo "====== 构建结束，查找所有 APK 文件 ======"
           # 全局搜索所有 .apk 文件，直接打印路径
           find . -name "*.apk"
           echo "====== 上面就是所有 APK 的真实路径 ======"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
           name: Debug-APK
           # 先不要写死路径，等日志出来后，把 find 命令输出的路径填到这里
           path:  # 留空，等你复制日志里的真实路径
