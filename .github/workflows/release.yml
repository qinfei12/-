name: Build

on:
  workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Build Packages
        shell: bash
        env:
          DISABLE_SVG: 1
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
          # 输出 APK 列表给后续步骤用
          ls -1 android/app/build/outputs/apk/debug/*.apk > apk_list.txt

      - name: Upload APKs individually
        shell: bash
        run: |
          while read -r apk_path; do
            apk_name=$(basename "$apk_path" .apk)
            echo "Uploading $apk_path as $apk_name"
            gh run upload-artifact -n "$apk_name" "$apk_path"
          done < apk_list.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
